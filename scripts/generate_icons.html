<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ClodCount — Icon Generator</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #f5f0eb; padding: 30px; }
    h2 { color: #1a1a18; margin-bottom: 16px; }
    .row { display: flex; gap: 20px; align-items: flex-end; flex-wrap: wrap; margin-bottom: 24px; }
    .icon-box { text-align: center; }
    canvas { display: block; border-radius: 22%; box-shadow: 0 2px 12px rgba(0,0,0,0.18); }
    a.dl { display: block; margin-top: 8px; font-size: 12px; color: #d97757; text-decoration: none; font-weight: 600; }
    a.dl:hover { text-decoration: underline; }
    label { font-size: 11px; color: #6b6560; display: block; margin-bottom: 4px; }
    p { color: #6b6560; font-size: 13px; }
  </style>
</head>
<body>
  <h2>ClodCount Icon Generator</h2>
  <p>Right-click each icon and "Save image as…" — or click the Download link. Save to <code>icons/</code> folder.</p>
  <div class="row" id="icons-row"></div>
  <script>
    const SIZES = [16, 48, 128];

    function drawIcon(size) {
      const canvas = document.createElement('canvas');
      canvas.width  = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');

      const s   = size;
      const cx  = s / 2;
      const cy  = s / 2;
      const r   = s * 0.42;

      // ── Background ─────────────────────────────────────────────────────────
      // Rounded square
      const bRadius = s * 0.22;
      ctx.beginPath();
      ctx.moveTo(bRadius, 0);
      ctx.lineTo(s - bRadius, 0);
      ctx.quadraticCurveTo(s, 0, s, bRadius);
      ctx.lineTo(s, s - bRadius);
      ctx.quadraticCurveTo(s, s, s - bRadius, s);
      ctx.lineTo(bRadius, s);
      ctx.quadraticCurveTo(0, s, 0, s - bRadius);
      ctx.lineTo(0, bRadius);
      ctx.quadraticCurveTo(0, 0, bRadius, 0);
      ctx.closePath();

      // Warm dark background
      const grad = ctx.createLinearGradient(0, 0, s, s);
      grad.addColorStop(0, '#2a2826');
      grad.addColorStop(1, '#1a1918');
      ctx.fillStyle = grad;
      ctx.fill();

      // ── Hexagon ─────────────────────────────────────────────────────────────
      const hexR = r;
      ctx.beginPath();
      for (let i = 0; i < 6; i++) {
        const angle = (Math.PI / 180) * (60 * i - 30);
        const x = cx + hexR * Math.cos(angle);
        const y = cy + hexR * Math.sin(angle);
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.closePath();

      // Accent gradient orange-brown fill (translucent)
      const hexGrad = ctx.createLinearGradient(cx - r, cy - r, cx + r, cy + r);
      hexGrad.addColorStop(0, 'rgba(217, 119, 87, 0.18)');
      hexGrad.addColorStop(1, 'rgba(200, 104, 67, 0.12)');
      ctx.fillStyle = hexGrad;
      ctx.fill();

      // Stroke
      ctx.strokeStyle = '#d97757';
      ctx.lineWidth = Math.max(1, s * 0.04);
      ctx.stroke();

      // ── "C" text ─────────────────────────────────────────────────────────────
      if (size >= 48) {
        ctx.font = `700 ${Math.round(s * 0.38)}px Inter, system-ui, sans-serif`;
        ctx.textAlign    = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle    = '#d97757';
        ctx.fillText('C', cx, cy + s * 0.03);
      } else {
        // For 16px — solid dot only
        ctx.beginPath();
        ctx.arc(cx, cy, s * 0.18, 0, Math.PI * 2);
        ctx.fillStyle = '#d97757';
        ctx.fill();
      }

      return canvas;
    }

    const row = document.getElementById('icons-row');

    SIZES.forEach((size) => {
      const canvas = drawIcon(size);
      const box    = document.createElement('div');
      box.className = 'icon-box';

      const lbl = document.createElement('label');
      lbl.textContent = `${size}×${size}`;

      const dl = document.createElement('a');
      dl.className = 'dl';
      dl.textContent = `⬇ icon${size}.png`;
      dl.href     = canvas.toDataURL('image/png');
      dl.download = `icon${size}.png`;

      box.appendChild(lbl);
      box.appendChild(canvas);
      box.appendChild(dl);
      row.appendChild(box);
    });
  </script>
</body>
</html>
